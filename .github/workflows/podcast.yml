name: Goias Economico em 5 Minutos

on:
  schedule:
    - cron: "45 9 * * *"
  workflow_dispatch:
    inputs:
      apenas_whatsapp:
        description: "Pular geracao e enviar so o WhatsApp (usa episodio ja gerado hoje)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  gerar-podcast:
    name: Gerar episodio do dia
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar ffmpeg
        if: ${{ inputs.apenas_whatsapp != true }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Gerar roteiro e MP3
        if: ${{ inputs.apenas_whatsapp != true }}
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
        run: python podcast_generator.py

      - name: Commitar roteiro e markdown em episodios/
        if: ${{ inputs.apenas_whatsapp != true }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "episodios/texto_tts_goias_economico_5min_${TODAY}.txt" \
                  "episodios/goias_economico_5min_${TODAY}.md"
          git commit -m "ep ${TODAY}: roteiro + markdown" || echo "Nada a commitar"
          git push

      - name: Publicar MP3 no GitHub Release
        if: ${{ inputs.apenas_whatsapp != true }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          gh release delete "ep-${TODAY}" --cleanup-tag --yes 2>/dev/null || true
          gh release create "ep-${TODAY}" \
            "episodios/goias_economico_5min_${TODAY}.mp3" \
            --title "Goias Economico em 5 Minutos - ${TODAY}" \
            --notes "Episodio gerado automaticamente em ${TODAY}." \
            --repo "${{ github.repository }}"

      - name: Enviar resumo e audio ao WhatsApp
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: python podcast_generator.py --whatsapp

      - name: Registrar resultado no sumario
        if: always()
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          META="episodios/.meta_${TODAY}.env"
          echo "## Goias Economico -- ${TODAY}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "Episodio gerado e enviado ao WhatsApp com sucesso." >> $GITHUB_STEP_SUMMARY
            if [ -f "$META" ]; then
              cat "$META" | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "Falha na geracao do episodio. Verifique os logs acima." >> $GITHUB_STEP_SUMMARY
          fi
